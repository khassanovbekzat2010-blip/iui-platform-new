<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IUI — Teacher Login</title>
  <style>
    :root{
      --brand-1:#7c5cff;
      --brand-2:#4dd6ff;
      --ok:#22c55e;
      --warn:#f59e0b;
      --bad:#fb7185;
      --bg:#070a14;
      --bg2:#0b1022;
      --text:#eef2ff;
      --muted:#a9b7df;
    }
    
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      color:var(--text);
      background:
        radial-gradient(1100px 600px at 15% 0%, rgba(124,92,255,.30), transparent 60%),
        radial-gradient(900px 520px at 90% 5%, rgba(77,214,255,.20), transparent 60%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }
    
    .login-container{
      width:100%;
      max-width:400px;
      background: rgba(255,255,255,.05);
      backdrop-filter: blur(12px);
      border:1px solid rgba(255,255,255,.1);
      border-radius:24px;
      padding:32px;
      box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }
    
    .logo{
      width:60px;height:60px;border-radius:16px;
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      box-shadow: 0 16px 28px rgba(124,92,255,.25);
      margin:0 auto 24px;
      position:relative;
    }
    .logo:after{
      content:"";
      position:absolute; inset:10px;
      border-radius:10px;
      background: rgba(255,255,255,.18);
      opacity:.35;
    }
    
    h1{
      text-align:center;
      margin:0 0 8px 0;
      font-size:24px;
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .subtitle{
      text-align:center;
      color:var(--muted);
      margin-bottom:32px;
      font-size:14px;
    }
    
    .input-group{
      margin-bottom:20px;
    }
    
    label{
      display:block;
      margin-bottom:8px;
      color:var(--muted);
      font-size:14px;
    }
    
    input, select{
      width:100%;
      padding:12px 16px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.1);
      background: rgba(0,0,0,.3);
      color:var(--text);
      font-size:14px;
      outline:none;
      transition: all 0.2s ease;
    }
    
    input:focus, select:focus{
      border-color:var(--brand-1);
      box-shadow:0 0 0 3px rgba(124,92,255,.1);
    }
    
    .btn{
      width:100%;
      padding:14px;
      border-radius:12px;
      border:none;
      background: linear-gradient(135deg, var(--brand-1), var(--brand-2));
      color:white;
      font-size:16px;
      font-weight:600;
      cursor:pointer;
      margin-top:8px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    
    .btn:hover{
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(124,92,255,.25);
    }
    
    .btn:active{
      transform: translateY(0);
    }
    
    .error{
      color:var(--bad);
      font-size:14px;
      margin-top:12px;
      text-align:center;
      display:none;
    }
    
    .teacher-option{
      background: rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.1);
      border-radius:12px;
      padding:16px;
      margin-bottom:12px;
      cursor:pointer;
      transition: all 0.2s ease;
    }
    
    .teacher-option:hover{
      background: rgba(255,255,255,.08);
      border-color:var(--brand-1);
    }
    
    .teacher-option.active{
      background: rgba(124,92,255,.15);
      border-color:var(--brand-1);
    }
    
    .teacher-name{
      font-weight:600;
      margin-bottom:4px;
    }
    
    .teacher-details{
      font-size:12px;
      color:var(--muted);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo"></div>
    <h1>IUI Teacher Portal</h1>
    <div class="subtitle">Interactive Learning Analytics Dashboard</div>
    
    <div id="teacherSelection">
      <div class="input-group">
        <label>Select Teacher Account</label>
        <div class="teacher-option" onclick="selectTeacher('teacher1', 'teacher123')">
          <div class="teacher-name">👩‍🏫 Анна Иванова</div>
          <div class="teacher-details">Математика, Физика • Классы: 10A, 10B</div>
        </div>
        <div class="teacher-option" onclick="selectTeacher('teacher2', 'teacher456')">
          <div class="teacher-name">👨‍🏫 Петр Сидоров</div>
          <div class="teacher-details">Химия, Биология • Классы: 11A, 11B</div>
        </div>
        <div class="teacher-option" onclick="selectTeacher('teacher3', 'teacher789')">
          <div class="teacher-name">👩‍🏫 Мария Ким</div>
          <div class="teacher-details">История, Обществознание • Классы: 9A, 9B, 9C</div>
        </div>
      </div>
    </div>
    
    <div class="input-group" id="passwordGroup" style="display:none">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter teacher password">
    </div>
    
    <div class="error" id="errorMessage"></div>
    
    <button class="btn" onclick="login()" id="loginBtn">Login</button>
  </div>

  <script>
    let selectedTeacher = null;
    let selectedPassword = null;
    
    function selectTeacher(teacherId, password) {
      // Remove active class from all options
      document.querySelectorAll('.teacher-option').forEach(opt => {
        opt.classList.remove('active');
      });
      
      // Add active class to selected option
      event.currentTarget.classList.add('active');
      
      selectedTeacher = teacherId;
      selectedPassword = password;
      
      // Show password input
      document.getElementById('passwordGroup').style.display = 'block';
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
    
    async function login() {
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('errorMessage');
      
      if (!selectedTeacher) {
        errorEl.textContent = 'Please select a teacher account';
        errorEl.style.display = 'block';
        return;
      }
      
      if (!password) {
        errorEl.textContent = 'Please enter password';
        errorEl.style.display = 'block';
        return;
      }
      
      try {
        const response = await fetch('/api/teacher/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            teacherId: selectedTeacher,
            password: password
          })
        });
        
        const data = await response.json();
        
        if (data.ok) {
          localStorage.setItem('teacherToken', data.token);
          window.location.href = 'teacher.html';
        } else {
          errorEl.textContent = data.error || 'Login failed';
          errorEl.style.display = 'block';
        }
      } catch (error) {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
      }
    }
    
    // Allow Enter key to trigger login
    document.getElementById('password')?.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        login();
      }
    });
  </script>
</body>
</html>
